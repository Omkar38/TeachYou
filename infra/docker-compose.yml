services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
      POSTGRES_DB: genai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      POSTGRES_DSN: postgresql+psycopg2://genai:genai@postgres:5432/genai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    depends_on:
      - postgres
      - redis
      - chroma

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      POSTGRES_DSN: postgresql+psycopg2://genai:genai@postgres:5432/genai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ../data:/app/data
    depends_on:
      - postgres
      - redis
      - chroma

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        # In the browser, API is reached via host port mapping
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  chroma_data:
